<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickServiço - Categorias</title>
  <link rel="stylesheet" href="categorias.css" />
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="img/click2.png" alt="Logo ClickServiço" class="logo" />
        <span class="brand-name">ClickServiço</span>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar serviços, profissionais..." />
        <button id="clearSearch">✕</button>
      </div>

      <div class="header-actions">
        <a href="#" class="btn btn-primary">Seja um profissional</a>
        <nav class="mini-nav">
          <a href="#">Meus pedidos</a>
          <a href="#">Caputi</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- ====== CONTEÚDO ====== -->
  <main class="container page">
    <h2 class="page-title">Categorias de Serviços</h2>
    
    <div id="categorias-grid" class="categories-grid">
      
      <article class="category-card" data-category="encanador">
        <div class="category-icon">💧</div>
        <div class="card-body">
          <h3>ENCANADOR</h3>
          <p>Ver profissionais</p>
        </div>
      </article>

      <article class="category-card" data-category="pintor">
        <div class="category-icon">🎨</div>
        <div class="card-body">
          <h3>PINTOR</h3>
          <p>Ver profissionais</p>
        </div>
      </article>

      <article class="category-card" data-category="eletricista">
        <div class="category-icon">⚡</div>
        <div class="card-body">
          <h3>ELETRICISTA</h3>
          <p>Ver profissionais</p>
        </div>
      </article>

      <article class="category-card" data-category="pedreiro">
        <div class="category-icon">🧱</div>
        <div class="card-body">
          <h3>PEDREIRO</h3>
          <p>Ver profissionais</p>
        </div>
      </article>

      <article class="category-card" data-category="carpinteiro">
        <div class="category-icon">🪚</div>
        <div class="card-body">
          <h3>CARPINTEIRO</h3>
          <p>Ver profissionais</p>
        </div>
      </article>

    </div>
  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="site-footer">
    © 2026 ClickServiço
  </footer>

  <script src="categorias.js"></script>
</body>
</html>
